<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>Navigation Map</title>

    <!-- Leaflet CSS -->
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <!-- Leaflet JS -->
    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV/XN/WLEo="
      crossorigin=""
    ></script>

    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: #f5f5f5;
        display: flex;
        flex-direction: column;
        height: 100vh;
        overflow: hidden;
      }

      /* ── Header bar ── */
      #header {
        background: #1a73e8;
        color: #fff;
        padding: 10px 14px;
        display: flex;
        align-items: center;
        gap: 10px;
        flex-shrink: 0;
      }
      #header .icon { font-size: 20px; }
      #header .info { flex: 1; min-width: 0; }
      #header .route-summary {
        font-size: 15px;
        font-weight: 600;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      #header .route-meta {
        font-size: 12px;
        opacity: 0.85;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      #mode-badge {
        background: rgba(255,255,255,0.2);
        border-radius: 12px;
        padding: 3px 10px;
        font-size: 12px;
        white-space: nowrap;
      }

      /* ── Map ── */
      #map {
        flex: 1 1 auto;
        min-height: 0;
      }

      /* ── Steps panel ── */
      #steps-panel {
        background: #fff;
        flex: 0 0 auto;
        max-height: 38vh;
        overflow-y: auto;
        border-top: 1px solid #e0e0e0;
      }
      #steps-panel h3 {
        font-size: 13px;
        font-weight: 600;
        color: #555;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        padding: 8px 14px 4px;
        background: #fafafa;
        border-bottom: 1px solid #e8e8e8;
        position: sticky;
        top: 0;
      }
      .step-item {
        display: flex;
        align-items: flex-start;
        gap: 10px;
        padding: 8px 14px;
        border-bottom: 1px solid #f0f0f0;
        font-size: 13px;
        color: #333;
        line-height: 1.4;
      }
      .step-item:last-child { border-bottom: none; }
      .step-num {
        min-width: 22px;
        height: 22px;
        border-radius: 50%;
        background: #1a73e8;
        color: #fff;
        font-size: 11px;
        font-weight: 700;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        margin-top: 1px;
      }
      .step-num.last { background: #e53935; }

      /* ── Error state ── */
      #error-msg {
        display: none;
        padding: 24px;
        text-align: center;
        color: #c62828;
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <div id="header">
      <div class="icon" id="mode-icon">🚗</div>
      <div class="info">
        <div class="route-summary" id="route-summary">Loading route…</div>
        <div class="route-meta" id="route-meta"></div>
      </div>
      <div id="mode-badge">driving</div>
    </div>

    <div id="map"></div>

    <div id="steps-panel">
      <h3>Turn-by-turn directions</h3>
      <div id="steps-list"></div>
    </div>

    <div id="error-msg"></div>

    <script>
      const MODE_ICONS = {driving: '🚗', walking: '🚶', cycling: '🚲'};

      function showError(msg) {
        document.getElementById('map').style.display = 'none';
        document.getElementById('steps-panel').style.display = 'none';
        document.getElementById('header').style.background = '#c62828';
        document.getElementById('route-summary').textContent = 'Navigation error';
        const err = document.getElementById('error-msg');
        err.style.display = 'block';
        err.textContent = msg;
      }

      function init() {
        // Parse ?data= URL param
        const params = new URLSearchParams(window.location.search);
        const raw = params.get('data');
        if (!raw) { showError('No route data provided.'); return; }

        let payload;
        try {
          payload = JSON.parse(decodeURIComponent(escape(atob(raw))));
        } catch (e) {
          showError('Failed to decode route data: ' + e.message);
          return;
        }

        const {originCoords, destCoords, geometry, steps, duration, distance, mode} = payload;

        // ── Header ──
        const modeLabel = (mode || 'driving');
        document.getElementById('mode-icon').textContent = MODE_ICONS[modeLabel] || '🗺️';
        document.getElementById('mode-badge').textContent = modeLabel;
        document.getElementById('route-summary').textContent =
          `${distance}  ·  ~${duration}`;
        document.getElementById('route-meta').textContent =
          `${originCoords.display.split(',')[0]}  →  ${destCoords.display.split(',')[0]}`;

        // ── Map ──
        const map = L.map('map', {zoomControl: true});

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
          attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
          maxZoom: 19,
        }).addTo(map);

        // Draw route polyline
        const coords = geometry.coordinates.map(([lon, lat]) => [lat, lon]);
        const polyline = L.polyline(coords, {
          color: '#1a73e8',
          weight: 5,
          opacity: 0.85,
        }).addTo(map);

        // Origin marker (green)
        const greenIcon = L.divIcon({
          className: '',
          html: `<div style="width:14px;height:14px;border-radius:50%;background:#34a853;border:3px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.4)"></div>`,
          iconSize: [14, 14],
          iconAnchor: [7, 7],
        });
        L.marker([originCoords.lat, originCoords.lon], {icon: greenIcon})
          .bindPopup(`<b>Start</b><br>${originCoords.display.split(',').slice(0, 2).join(',')}`)
          .addTo(map);

        // Destination marker (red)
        const redIcon = L.divIcon({
          className: '',
          html: `<div style="width:16px;height:16px;border-radius:50%;background:#e53935;border:3px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.4)"></div>`,
          iconSize: [16, 16],
          iconAnchor: [8, 8],
        });
        L.marker([destCoords.lat, destCoords.lon], {icon: redIcon})
          .bindPopup(`<b>Destination</b><br>${destCoords.display.split(',').slice(0, 2).join(',')}`)
          .addTo(map);

        // Fit map to route bounds
        map.fitBounds(polyline.getBounds(), {padding: [20, 20]});

        // ── Steps ──
        const list = document.getElementById('steps-list');
        if (steps && steps.length) {
          steps.forEach((step, i) => {
            const div = document.createElement('div');
            div.className = 'step-item';
            const isLast = i === steps.length - 1;
            div.innerHTML = `
              <div class="step-num ${isLast ? 'last' : ''}">${i + 1}</div>
              <div>${step}</div>
            `;
            list.appendChild(div);
          });
        } else {
          list.innerHTML = '<div class="step-item">No step details available.</div>';
        }
      }

      window.addEventListener('load', init);
    </script>
  </body>
</html>
