<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gemma Navigation</title>
  </head>
  <body>
    <script>
      window['ai_edge_gallery_get_result'] = async (data) => {
        try {
          const input = typeof data === 'string' ? JSON.parse(data) : data;
          const origin      = (input.origin      || '').trim();
          const destination = (input.destination || '').trim();
          const mode        = (input.mode        || 'driving').toLowerCase();

          if (!origin || !destination) {
            return JSON.stringify({
              result: `Erreur : origine ou destination manquante. Reçu : ${JSON.stringify(input)}`
            });
          }

          // Google Maps directions embed — no network call needed
          const gmMode = mode === 'walking' ? 'w' : mode === 'cycling' ? 'b' : 'd';
          const mapUrl =
            `https://maps.google.com/maps?saddr=${encodeURIComponent(origin)}` +
            `&daddr=${encodeURIComponent(destination)}&dirflg=${gmMode}&output=embed`;

          const modeLabel = {driving: 'En voiture', walking: 'À pied', cycling: 'À vélo'}[mode] || mode;

          return JSON.stringify({
            result: `${modeLabel} de ${origin} à ${destination}\nOuvrez la carte ci-dessous pour l'itinéraire complet.`,
            webview: {iframe: true, url: mapUrl},
          });
        } catch (e) {
          return JSON.stringify({result: `Erreur JS : ${e.message}`});
        }
      };
    </script>
  </body>
</html>
