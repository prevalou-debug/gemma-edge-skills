<!DOCTYPE html>
<html lang="en">
  <head><meta charset="UTF-8" /><title>Gemma Web Search</title></head>
  <body>
    <script>
      window['ai_edge_gallery_get_result'] = async (data) => {
        try {
          const input = typeof data === 'string' ? JSON.parse(data) : data;
          const query = (input.query || '').trim();
          const lang  = (input.lang  || 'fr').toLowerCase().slice(0, 2);

          if (!query) {
            return JSON.stringify({result: 'Aucune requete recue.'});
          }

          // DuckDuckGo Instant Answers for quick facts (works for well-known topics)
          let summary = '';
          try {
            const params = new URLSearchParams({
              q: query, format: 'json', no_html: '1', skip_disambig: '1', t: 'GemmaSearch',
            });
            const d = await fetch('https://api.duckduckgo.com/?' + params).then(r => r.json());

            const lines = [];
            if (d.Answer) lines.push(d.Answer);
            if (d.AbstractText) lines.push(d.AbstractText.slice(0, 300) + (d.AbstractText.length > 300 ? '...' : ''));
            if (d.Definition) lines.push(d.Definition);
            const topics = (d.RelatedTopics || []).filter(t => t.Text).slice(0, 3).map(t => '• ' + t.Text.slice(0, 120));
            if (topics.length) lines.push(topics.join('\n'));
            if (lines.length) summary = lines.join('\n\n');
          } catch (_) {}

          // Open full DuckDuckGo results page in the webview
          const searchUrl = 'https://duckduckgo.com/?q=' + encodeURIComponent(query) + '&ia=web&kl=' + lang + '-' + lang;

          const resultText = summary
            ? 'Reponse pour "' + query + '" :\n\n' + summary + '\n\nPage de recherche complete ci-dessous.'
            : 'Resultats DuckDuckGo pour "' + query + '" affiches ci-dessous.';

          return JSON.stringify({
            result: resultText,
            webview: {iframe: true, url: searchUrl},
          });
        } catch (e) {
          return JSON.stringify({result: 'Erreur : ' + e.message});
        }
      };
    </script>
  </body>
</html>
