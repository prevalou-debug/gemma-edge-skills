<!DOCTYPE html>
<html lang="en">
  <head><meta charset="UTF-8" /><title>Gemma Web Search</title></head>
  <body>
    <script>
      window['ai_edge_gallery_get_result'] = async (data) => {
        try {
          const input = typeof data === 'string' ? JSON.parse(data) : data;
          const query = (input.query || '').trim();
          const lang  = (input.lang  || 'fr').toLowerCase().slice(0, 2);

          if (!query) {
            return JSON.stringify({result: 'Aucune requete recue.'});
          }

          // Try DuckDuckGo Instant Answers for a quick summary
          let summary = '';
          try {
            const params = new URLSearchParams({
              q: query, format: 'json', no_html: '1', skip_disambig: '1', t: 'GemmaWebSearch',
            });
            const res = await fetch('https://api.duckduckgo.com/?' + params);
            const d = await res.json();

            const lines = [];
            if (d.Answer) lines.push('Reponse : ' + d.Answer);
            if (d.AbstractText) lines.push(d.AbstractText + (d.AbstractURL ? '\nSource : ' + d.AbstractURL : ''));
            if (d.Definition) lines.push('Definition : ' + d.Definition);
            const topics = (d.RelatedTopics || []).filter(t => t.Text).slice(0, 3).map(t => '- ' + t.Text);
            if (topics.length) lines.push('Sujets lies :\n' + topics.join('\n'));
            if (lines.length) summary = lines.join('\n\n') + '\n\n';
          } catch (_) {}

          // Always open full DuckDuckGo search results as webview
          const searchUrl = 'https://duckduckgo.com/?q=' + encodeURIComponent(query) + '&kl=' + lang + '-' + lang;

          return JSON.stringify({
            result: summary + 'Resultats pour "' + query + '" (voir ci-dessous) :',
            webview: {iframe: true, url: searchUrl},
          });
        } catch (e) {
          return JSON.stringify({result: 'Erreur : ' + e.message});
        }
      };
    </script>
  </body>
</html>
