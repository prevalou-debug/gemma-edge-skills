<!DOCTYPE html>
<html lang="en">
  <head><meta charset="UTF-8" /><title>Gemma Web Search</title></head>
  <body>
    <script>
      window['ai_edge_gallery_get_result'] = async (data) => {
        try {
          const input = typeof data === 'string' ? JSON.parse(data) : data;
          const query = (input.query || '').trim();
          const lang  = (input.lang  || 'fr').toLowerCase().slice(0, 2);

          if (!query) {
            return JSON.stringify({result: 'Aucune requete recue. Input: ' + JSON.stringify(input)});
          }

          // Wikipedia API — confirmed working in Edge Gallery WebView
          const params = new URLSearchParams({
            action: 'query',
            generator: 'search',
            gsrsearch: query,
            gsrlimit: '3',
            prop: 'extracts',
            exintro: '',
            explaintext: '',
            exsentences: '3',
            redirects: '1',
            format: 'json',
            origin: '*',
          });
          const res = await fetch('https://' + lang + '.wikipedia.org/w/api.php?' + params);
          const json = await res.json();
          const pages = json && json.query && json.query.pages;

          if (!pages || Object.keys(pages).length === 0) {
            return JSON.stringify({result: 'Aucun resultat trouve pour : ' + query});
          }

          const results = Object.values(pages)
            .sort((a, b) => (a.index || 0) - (b.index || 0))
            .map(p => p.title + ' : ' + (p.extract || '').split('\n')[0])
            .join('\n\n');

          return JSON.stringify({result: 'Resultats pour "' + query + '" :\n\n' + results});
        } catch (e) {
          return JSON.stringify({result: 'Erreur : ' + e.message});
        }
      };
    </script>
  </body>
</html>
