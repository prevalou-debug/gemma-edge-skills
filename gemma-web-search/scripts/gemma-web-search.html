<!DOCTYPE html>
<html lang="en">
  <head><meta charset="UTF-8" /><title>Gemma Web Search</title></head>
  <body>
    <script>
      window['ai_edge_gallery_get_result'] = async (data) => {
        try {
          const input = typeof data === 'string' ? JSON.parse(data) : data;
          const query = (input.query || '').trim();

          if (!query) {
            return JSON.stringify({result: 'Aucune requete recue.'});
          }

          const p = new URLSearchParams({
            q: query, format: 'json', no_html: '1', skip_disambig: '1', t: 'GemmaSearch',
          });
          const d = await fetch('https://api.duckduckgo.com/?' + p).then(r => r.json());

          const lines = [];
          if (d.Answer)       lines.push(d.Answer);
          if (d.AbstractText) lines.push(d.AbstractText.slice(0, 500) + (d.AbstractText.length > 500 ? '...' : ''));
          if (d.Definition)   lines.push(d.Definition);
          const topics = (d.RelatedTopics || []).filter(t => t.Text).slice(0, 5)
                           .map(t => '• ' + t.Text.slice(0, 150));
          if (topics.length)  lines.push(topics.join('\n'));

          if (!lines.length) {
            return JSON.stringify({
              result: 'Aucun resultat instantane pour "' + query + '".\n\nDuckDuckGo Instant Answers ne couvre pas les actualites ni les sujets peu connus. Essayez un terme plus precis ou plus connu.',
            });
          }

          return JSON.stringify({result: lines.join('\n\n')});

        } catch (e) {
          return JSON.stringify({result: 'Erreur reseau : ' + e.message});
        }
      };
    </script>
  </body>
</html>
