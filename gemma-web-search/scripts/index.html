<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gemma Web Search</title>
  </head>
  <body>
    <script>
      // ── DuckDuckGo Instant Answers ─────────────────────────────────────────
      async function fetchDDG(query) {
        const params = new URLSearchParams({
          q: query,
          format: 'json',
          no_html: '1',
          skip_disambig: '1',
          t: 'GemmaWebSearch',
        });
        const res = await fetch(`https://api.duckduckgo.com/?${params}`);
        if (!res.ok) throw new Error(`DDG HTTP ${res.status}`);
        return res.json();
      }

      // ── Wikipedia summary ─────────────────────────────────────────────────
      async function fetchWikipedia(topic, lang) {
        const params = new URLSearchParams({
          action: 'query',
          generator: 'search',
          gsrsearch: topic,
          gsrlimit: '1',
          prop: 'extracts',
          exintro: '',
          explaintext: '',
          exsentences: '4',
          redirects: '1',
          format: 'json',
          origin: '*',
        });
        const url = `https://${lang}.wikipedia.org/w/api.php?${params}`;
        const res = await fetch(url);
        if (!res.ok) throw new Error(`Wikipedia HTTP ${res.status}`);
        const data = await res.json();
        const pages = data?.query?.pages;
        if (!pages) return null;
        const page = Object.values(pages)[0];
        if (!page || page.missing !== undefined) return null;
        return {
          title: page.title,
          extract: (page.extract || '').replace(/\n{3,}/g, '\n\n').trim(),
          url: `https://${lang}.wikipedia.org/wiki/${encodeURIComponent(page.title)}`,
        };
      }

      // ── Format DDG response ───────────────────────────────────────────────
      function formatDDG(ddg, query) {
        const lines = [];

        // Direct answer (e.g. unit conversion, calculation)
        if (ddg.Answer) {
          lines.push(`Answer: ${ddg.Answer}`);
        }

        // Abstract (from Wikipedia/other sources)
        if (ddg.AbstractText) {
          lines.push(ddg.AbstractText);
          if (ddg.AbstractURL) lines.push(`Source: ${ddg.AbstractURL}`);
        }

        // Definition
        if (ddg.Definition) {
          lines.push(`Definition: ${ddg.Definition}`);
          if (ddg.DefinitionURL) lines.push(`Source: ${ddg.DefinitionURL}`);
        }

        // Related topics (top 3)
        if (ddg.RelatedTopics && ddg.RelatedTopics.length) {
          const topics = ddg.RelatedTopics
            .filter(t => t.Text)
            .slice(0, 3)
            .map(t => `• ${t.Text}`);
          if (topics.length) {
            lines.push('');
            lines.push('Related:');
            lines.push(...topics);
          }
        }

        return lines.join('\n').trim();
      }

      // ── Main ──────────────────────────────────────────────────────────────
      window['ai_edge_gallery_get_result'] = async (data) => {
        let input;
        try {
          input = typeof data === 'string' ? JSON.parse(data) : data;
        } catch (e) {
          return JSON.stringify({result: `[Search] JSON parse error: ${e.message} — received: ${String(data).slice(0, 100)}`});
        }

        const query = (input.query || '').trim();
        const lang  = (input.lang  || 'en').toLowerCase().slice(0, 2);

        if (!query) {
          return JSON.stringify({result: '[Search] No query provided. Input: ' + JSON.stringify(input)});
        }

        const sections = [];

        // 1. DuckDuckGo Instant Answers
        try {
          const ddg = await fetchDDG(query);
          const ddgText = formatDDG(ddg, query);
          if (ddgText) sections.push(ddgText);
        } catch (e) {
          sections.push(`[DDG unavailable: ${e.message}]`);
        }

        // 2. Wikipedia summary
        try {
          const wiki = await fetchWikipedia(query, lang);
          if (wiki) {
            // Avoid duplication if DDG already sourced from Wikipedia
            const alreadyHasAbstract = sections.some(s => s.length > 100);
            if (!alreadyHasAbstract || sections.length === 0) {
              const MAX_CHARS = lang === 'zh' ? 800 : 1500;
              let extract = wiki.extract;
              if (extract.length > MAX_CHARS) {
                extract = extract.slice(0, MAX_CHARS) + '… [tronqué]';
              }
              sections.push(`Wikipedia — ${wiki.title}:\n${extract}`);
              sections.push(`Source: ${wiki.url}`);
            }
          }
        } catch (e) {
          // Wikipedia optional — silently ignore
        }

        if (sections.length === 0) {
          sections.push(`Aucun résultat trouvé pour "${query}". Essayez des mots-clés différents.`);
        }

        const result = sections.join('\n\n');

        // DuckDuckGo search results page as webview (native WebView, not iframe)
        const searchUrl = `https://duckduckgo.com/?q=${encodeURIComponent(query)}&ia=web`;

        return JSON.stringify({
          result,
          webview: {url: searchUrl, aspectRatio: 1.6},
        });
      };
    </script>
  </body>
</html>
