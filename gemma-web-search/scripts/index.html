<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gemma Web Search</title>
  </head>
  <body>
    <script>
      // No fetch() calls — pure URL construction, instant response.
      window['ai_edge_gallery_get_result'] = async (data) => {
        try {
          const input = typeof data === 'string' ? JSON.parse(data) : data;
          const query = (input.query || '').trim();
          const lang  = (input.lang  || 'fr').toLowerCase().slice(0, 2);

          if (!query) {
            return JSON.stringify({result: 'Aucune requête reçue. Input: ' + JSON.stringify(input)});
          }

          // DuckDuckGo search — works as native WebView, no iframe restriction
          const searchUrl = 'https://duckduckgo.com/?q=' + encodeURIComponent(query) + '&kl=' + lang + '-' + lang;

          return JSON.stringify({
            result: 'Résultats de recherche pour : ' + query,
            webview: {url: searchUrl, aspectRatio: 1.6},
          });
        } catch (e) {
          return JSON.stringify({result: 'Erreur : ' + e.message});
        }
      };
    </script>
  </body>
</html>
