<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Recherche</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, -apple-system, sans-serif; background: #f5f5f5; color: #222; font-size: 14px; }
    #header { background: #fff; padding: 10px 14px; border-bottom: 1px solid #e0e0e0; }
    #header h1 { font-size: 14px; color: #555; font-weight: 500; }
    #header strong { color: #222; }
    #results { padding: 10px; }
    .card { background: #fff; border-radius: 8px; padding: 12px; margin-bottom: 10px; box-shadow: 0 1px 3px rgba(0,0,0,.07); }
    .card-label { font-size: 11px; font-weight: 700; color: #888; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 6px; }
    .card-title { font-size: 14px; font-weight: 600; color: #1a0dab; margin-bottom: 4px; line-height: 1.3; }
    .card-title a { color: #1a0dab; text-decoration: none; }
    .card-body { font-size: 13px; color: #444; line-height: 1.5; }
    .card-source { font-size: 11px; color: #aaa; margin-top: 5px; }
    .ddg-btn { display: block; text-align: center; margin: 14px 10px; padding: 11px; background: #de5833; color: #fff; border-radius: 8px; font-size: 13px; font-weight: 600; text-decoration: none; }
    .empty { color: #999; text-align: center; padding: 30px 20px; font-size: 13px; line-height: 1.6; }
    .loading { color: #aaa; text-align: center; padding: 40px; font-size: 13px; }
    .section-sep { font-size: 11px; font-weight: 700; color: #aaa; text-transform: uppercase; letter-spacing: .5px; padding: 8px 10px 4px; }
  </style>
</head>
<body>
  <div id="header"><h1>Recherche : <strong id="qtitle"></strong></h1></div>
  <div id="results"><div class="loading">Chargement…</div></div>

  <script>
    const sp    = new URLSearchParams(location.search);
    const query = (sp.get('q') || '').trim();
    const lang  = (sp.get('lang') || 'fr').slice(0, 2);

    document.getElementById('qtitle').textContent = query;

    function esc(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    async function run() {
      const el = document.getElementById('results');
      if (!query) { el.innerHTML = '<p class="empty">Aucune requête fournie.</p>'; return; }

      let html = '';
      let found = false;

      // ── 1. DuckDuckGo Instant Answers ──────────────────────────────────────
      try {
        const p = new URLSearchParams({ q: query, format: 'json', no_html: '1', skip_disambig: '1', t: 'GemmaSearch' });
        const d = await fetch('https://api.duckduckgo.com/?' + p).then(r => r.json());

        if (d.Answer) {
          found = true;
          html += '<div class="card"><div class="card-label">Réponse rapide</div><div class="card-body">' + esc(d.Answer) + '</div></div>';
        }
        if (d.AbstractText) {
          found = true;
          const src = d.AbstractSource ? ' — ' + esc(d.AbstractSource) : '';
          html += '<div class="card"><div class="card-title">' + esc(d.Heading || query) + '</div><div class="card-body">' + esc(d.AbstractText) + '</div><div class="card-source">' + src + (d.AbstractURL ? ' <a href="' + esc(d.AbstractURL) + '">' + esc(d.AbstractURL) + '</a>' : '') + '</div></div>';
        }
        if (d.Definition) {
          found = true;
          html += '<div class="card"><div class="card-label">Définition</div><div class="card-body">' + esc(d.Definition) + '</div></div>';
        }
        const topics = (d.RelatedTopics || []).filter(t => t.Text).slice(0, 5);
        if (topics.length) {
          found = true;
          html += '<div class="section-sep">Sujets liés</div>';
          topics.forEach(t => {
            const url = t.FirstURL || '';
            html += '<div class="card"><div class="card-body">' + (url ? '<a href="' + esc(url) + '">' : '') + esc(t.Text) + (url ? '</a>' : '') + '</div></div>';
          });
        }
      } catch (_) {}

      // ── 2. Google News RSS (fallback for news / obscure topics) ─────────────
      try {
        const gl  = lang.toUpperCase();
        const rss = 'https://news.google.com/rss/search?q=' + encodeURIComponent(query) + '&hl=' + lang + '&gl=' + gl + '&ceid=' + gl + ':' + lang;
        const txt = await fetch(rss).then(r => r.text());
        const xml = new DOMParser().parseFromString(txt, 'text/xml');
        const items = [...xml.querySelectorAll('item')].slice(0, 6);
        if (items.length) {
          html += '<div class="section-sep">Actualités Google News</div>';
          items.forEach(item => {
            const title  = item.querySelector('title')?.textContent  || '';
            const source = item.querySelector('source')?.textContent || '';
            const link   = item.querySelector('link')?.textContent   || '';
            html += '<div class="card"><div class="card-title">' + (link ? '<a href="' + esc(link) + '">' + esc(title) + '</a>' : esc(title)) + '</div>' + (source ? '<div class="card-source">' + esc(source) + '</div>' : '') + '</div>';
          });
          found = true;
        }
      } catch (_) {}

      if (!found) {
        html += '<p class="empty">Aucun résultat trouvé pour <strong>' + esc(query) + '</strong>.<br><br>Ce moteur couvre les faits connus et les actualités récentes. Essayez un terme plus général.</p>';
      }

      html += '<a class="ddg-btn" href="https://duckduckgo.com/?q=' + encodeURIComponent(query) + '">Ouvrir DuckDuckGo →</a>';
      el.innerHTML = html;
    }

    run();
  </script>
</body>
</html>
